<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#215a4f">
  <title>随身默写</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17211f;
      --muted: #66736f;
      --line: #dce5e1;
      --panel: #ffffff;
      --bg: #f5f7f2;
      --green: #215a4f;
      --green-2: #2f7569;
      --gold: #a66b18;
      --red: #b64242;
      --soft: #edf4ef;
      --shadow: 0 12px 28px rgba(35, 55, 48, .10);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 8px;
      min-height: 44px;
      padding: 0 14px;
      background: var(--green);
      color: #fff;
      font-weight: 700;
      touch-action: manipulation;
    }

    button.secondary {
      background: #e8efeb;
      color: var(--green);
    }

    button.warning {
      background: #f4e8d5;
      color: var(--gold);
    }

    button.danger {
      background: #f7dfdf;
      color: var(--red);
    }

    button:disabled {
      opacity: .55;
    }

    .app {
      width: min(920px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
      background: rgba(245, 247, 242, .92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .mini {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 6px;
      margin-top: 12px;
      background: #e7eee9;
      border-radius: 8px;
    }

    .tab {
      min-height: 38px;
      color: var(--green);
      background: transparent;
      border-radius: 6px;
      padding: 0 8px;
    }

    .tab.active {
      background: #fff;
      box-shadow: 0 2px 8px rgba(34, 61, 52, .10);
    }

    main {
      flex: 1;
      padding: 16px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    .study {
      display: grid;
      gap: 14px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .jumpbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
    }

    .jumpstatus {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    select,
    input {
      min-height: 46px;
      padding: 0 12px;
    }

    textarea {
      min-height: 42vh;
      padding: 12px;
      line-height: 1.55;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
    }

    .prompt {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 20px;
      min-height: 230px;
      display: grid;
      align-content: center;
      gap: 14px;
    }

    .tagrow {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      border: 1px solid #cbd9d4;
      border-radius: 999px;
      padding: 4px 10px;
      color: var(--muted);
      font-size: 12px;
      background: #fbfcfa;
    }

    .meaning {
      margin: 0;
      font-size: 26px;
      line-height: 1.32;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hint {
      margin: 0;
      min-height: 22px;
      color: var(--muted);
      font-size: 15px;
    }

    .answer {
      display: grid;
      gap: 10px;
    }

    .answer input {
      height: 54px;
      font-size: 20px;
      font-weight: 700;
      border-width: 2px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 10px;
    }

    .judgement {
      display: none;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
    }

    .judgement.show {
      display: grid;
    }

    .result {
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.45;
    }

    .result.ok {
      border-color: #9cc7b0;
      background: #edf8f1;
      color: #1f6844;
      font-weight: 700;
    }

    .result.bad {
      border-color: #e3b3b3;
      background: #fff1f1;
      color: #9a3030;
    }

    .empty {
      background: #fff;
      border: 1px dashed #c7d2ce;
      border-radius: 8px;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .tools {
      display: grid;
      gap: 10px;
    }

    .toolgrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .stat strong {
      display: block;
      font-size: 26px;
      line-height: 1.1;
      color: var(--green);
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .list {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 12px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .row b {
      display: block;
      font-size: 16px;
    }

    .row span {
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 520px) {
      main {
        padding: 12px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .jumpbar {
        grid-template-columns: 1fr 84px;
      }

      .jumpbar .save-position {
        grid-column: 1 / -1;
      }

      .meaning {
        font-size: 24px;
      }

      .prompt {
        min-height: 220px;
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topline">
        <h1>随身默写</h1>
        <div class="mini" id="todayText">0 个到期</div>
      </div>
      <nav class="tabs" aria-label="页面">
        <button class="tab active" data-tab="study">默写</button>
        <button class="tab" data-tab="deck">词库</button>
        <button class="tab" data-tab="report">统计</button>
      </nav>
    </header>

    <main>
      <section class="view active" id="study">
        <div class="study">
          <div class="controls">
            <select id="unitFilter" aria-label="分组"></select>
            <select id="scopeFilter" aria-label="范围">
              <option value="due">只练到期</option>
              <option value="all">全部乱序</option>
              <option value="wrong">错词优先</option>
            </select>
          </div>

          <div class="jumpbar">
            <input id="jumpInput" type="number" min="1" step="1" inputmode="numeric" aria-label="词库编号" placeholder="输入词库编号">
            <button id="jumpWord">跳转</button>
            <button class="secondary save-position" id="savePosition">保存位置</button>
          </div>
          <div class="jumpstatus" id="jumpStatus"></div>

          <div id="cardHost"></div>
        </div>
      </section>

      <section class="view" id="deck">
        <div class="tools">
          <textarea id="deckText" spellcheck="false" aria-label="词库文本"></textarea>
          <div class="toolgrid">
            <button id="saveDeck">保存词库</button>
            <button class="secondary" id="exportDeck">导出词库</button>
            <button class="warning" id="exportProgress">导出进度</button>
            <button class="danger" id="resetProgress">清空进度</button>
          </div>
          <div class="note">
            格式：英文、中文释义、提示、分组，中间用 Tab 分隔。英文可用 / 写多个答案。
          </div>
        </div>
      </section>

      <section class="view" id="report">
        <div class="stats" id="stats"></div>
        <div class="list" id="weakList"></div>
      </section>
    </main>
  </div>

      deckText = mergeDeckText(savedDeckText, defaultDeck);

    let progress = readJson(STORAGE_PROGRESS, {});
    let deck = [];
    let queue = [];
    let current = null;

    const tabs = document.querySelectorAll(".tab");
    const views = document.querySelectorAll(".view");

    const scopeFilter = document.getElementById("scopeFilter");

    const deckArea = document.getElementById("deckText");
    const todayText = document.getElementById("todayText");

    function readJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key)) || fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }


    function mergeDeckText(savedText, builtInText) {
      if (!savedText) return builtInText;
      const seen = new Set(parseDeck(savedText).map(item => `${item.id}	${item.unit}`));
      const additions = parseDeck(builtInText)
        .filter(item => !seen.has(`${item.id}	${item.unit}`))
        .map(item => `${item.word}	${item.meaning}	${item.hint}	${item.unit}`);
      return additions.length ? `${savedText.trim()}
${additions.join("\n")}` : savedText;
    }

    function parseDeck(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(line => line && !line.startsWith("#"))
        .map((line, index) => {
          const parts = line.includes("\t") ? line.split("\t") : line.split(",");
          const word = (parts[0] || "").trim();
          const meaning = (parts[1] || "").trim();
          const hint = (parts[2] || makeHint(word)).trim();
          const unit = (parts[3] || "未分组").trim();
          const answers = word.split(/[\/|;]/).map(x => normalize(x)).filter(Boolean);
          return { id: normalize(word) || String(index), word, meaning, hint, unit, answers };
        })
        .filter(item => item.word && item.meaning);
    }

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[’']/g, "")
        .replace(/[\s_-]+/g, "")
        .trim();
    }

    function makeHint(word) {
      const clean = String(word || "").split(/[\/|;]/)[0].trim();
      if (clean.length < 2) return clean;
      return clean[0] + "_".repeat(Math.max(1, clean.length - 1));
    }

    function normalizeUnitName(unit) {
      const text = String(unit || "???").trim();
      const match = text.match(/^Unit\s+(\d+)(?:\s+.*)?$/i);
      if (!match) return text;
      const number = Number.parseInt(match[1], 10);
      return UNIT_TITLES[number] ? `Unit ${number} ${UNIT_TITLES[number]}` : `Unit ${number}`;
    }

    function todayStart() {
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d.getTime();
    }

    function isDue(item) {
      const p = progress[item.id] || {};
      return !p.due || p.due <= Date.now();
    }

    function getProgress(item) {
      return progress[item.id] || { box: 0, ok: 0, bad: 0, due: 0 };
    }

    function buildQueue(preferred = null) {
      const unit = unitFilter.value;
      const scope = scopeFilter.value;
      let items = deck.filter(item => unit === "全部分组" || item.unit === unit);

      if (scope === "due") {
        items = items.filter(isDue);
      }

      if (scope === "wrong") {
        items = items
          .filter(item => getProgress(item).bad > 0 || isDue(item))
          .sort((a, b) => getProgress(b).bad - getProgress(a).bad);
      } else {
        items = shuffle(items);
      }

      queue = items;
      current = preferred && queue.some(item => item.id === preferred.id) ? preferred : queue[0] || null;
      renderCard();
      renderHeader();
      renderStats();
      updateJumpStatus();
    }

    function shuffle(items) {
      const out = [...items];
      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [out[i], out[j]] = [out[j], out[i]];
      }
      return out;
    }

    function renderHeader() {
      const due = deck.filter(isDue).length;
      todayText.textContent = `${due} 个到期`;
    }

    function renderUnits() {
      const currentValue = unitFilter.value || "全部分组";
      const units = ["全部分组", ...Array.from(new Set(deck.map(item => item.unit)))];
      units.sort((a, b) => {
        if (a === "全部分组") return -1;
        if (b === "全部分组") return 1;
        const numA = parseInt(a.match(/\d+/)?.[0] || "0");
        const numB = parseInt(b.match(/\d+/)?.[0] || "0");
        return numA - numB;
      });
      unitFilter.innerHTML = units.map(unit => `<option>${escapeHtml(unit)}</option>`).join("");
      unitFilter.value = units.includes(currentValue) ? currentValue : "全部分组";
    }

    function getDeckIndex(item) {
      return item ? deck.findIndex(entry => entry.id === item.id) : -1;
    }

    function getSavedIndex() {
      const value = Number.parseInt(localStorage.getItem(STORAGE_LAST_INDEX) || "", 10);
      return Number.isInteger(value) && value >= 1 ? value : 0;
    }

    function updateJumpStatus(message = "") {
      const saved = getSavedIndex();
      if (!deck.length) {
        jumpStatus.textContent = "";
        return;
      }
      if (message) {
        jumpStatus.textContent = message;
        return;
      }
      jumpStatus.textContent = saved ? `已保存编号 ${saved} / ${deck.length}` : `词库共 ${deck.length} 个词`;
      if (saved && document.activeElement !== jumpInput) {
        jumpInput.value = String(saved);
      }
    }

    function rememberCurrentPosition(message = "位置已保存") {
      const index = getDeckIndex(current);
      if (index < 0) return;
      const position = index + 1;
      localStorage.setItem(STORAGE_LAST_INDEX, String(position));
      if (document.activeElement !== jumpInput) jumpInput.value = String(position);
      updateJumpStatus(`${message}：${position} / ${deck.length}`);
    }

    function jumpToDeckIndex(rawValue) {
      const position = Number.parseInt(rawValue, 10);
      if (!Number.isInteger(position) || position < 1 || position > deck.length) {
        updateJumpStatus(`请输入 1-${deck.length} 之间的编号`);
        return;
      }

      const target = deck[position - 1];
      if (!target) return;
      unitFilter.value = target.unit;
      scopeFilter.value = "all";
      buildQueue(target);
      rememberCurrentPosition("已跳转到编号");
    }

    function renderCard(message = "") {
      if (!current) {
        cardHost.innerHTML = `<div class="empty">当前没有要默写的词。可以切换到“全部乱序”，或去词库添加新词。</div>`;
        return;
      }

      const p = getProgress(current);
      const position = Math.max(1, queue.indexOf(current) + 1);
      const deckPosition = getDeckIndex(current) + 1;
      cardHost.innerHTML = `
        <div class="prompt">
          <div class="tagrow">
            <span class="tag">${escapeHtml(current.unit)}</span>
            <span class="tag">词库 #${deckPosition}</span>
            <span class="tag">${position}/${queue.length}</span>
            <span class="tag">熟练度 ${p.box || 0}</span>
          </div>
          <p class="meaning">${escapeHtml(current.meaning)}</p>
          <p class="hint">提示：${escapeHtml(current.hint || makeHint(current.word))}</p>
        </div>
        <div class="answer">
          <input id="answerInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="输入英文">
          <div class="actions">
            <button id="checkAnswer">检查</button>
            <button class="secondary" id="showAnswer">看答案</button>
          </div>
          <div class="result" id="resultBox">${message || " "}</div>
          <div class="judgement" id="judgeBox">
            <button id="markOk">记住了</button>
            <button class="danger" id="markBad">还没会</button>
          </div>
        </div>
      `;

      const input = document.getElementById("answerInput");
      input.focus();
      document.getElementById("checkAnswer").addEventListener("click", checkAnswer);
      document.getElementById("showAnswer").addEventListener("click", revealAnswer);
      document.getElementById("markOk").addEventListener("click", () => grade(true));
      document.getElementById("markBad").addEventListener("click", () => grade(false));
      input.addEventListener("keydown", event => {
        if (event.key === "Enter") checkAnswer();
      });
    }

    function checkAnswer() {
      const input = document.getElementById("answerInput");
      const guess = normalize(input.value);
      const ok = current.answers.includes(guess);
      const result = document.getElementById("resultBox");
      const judge = document.getElementById("judgeBox");

      result.className = `result ${ok ? "ok" : "bad"}`;
      result.textContent = ok ? "正确" : `答案：${current.word}`;
      judge.classList.add("show");

      if (ok) grade(true);
    }

    function revealAnswer() {
      const result = document.getElementById("resultBox");
      result.className = "result bad";
      result.textContent = `答案：${current.word}`;
      document.getElementById("judgeBox").classList.add("show");
    }

    function grade(ok, rerender = true) {
      const p = getProgress(current);
      const intervals = [0, 1, 2, 4, 7, 15, 30, 60];
      const nextBox = ok ? Math.min((p.box || 0) + 1, intervals.length - 1) : 0;
      const due = todayStart() + intervals[nextBox] * 86400000;

      progress[current.id] = {
        box: nextBox,
        ok: (p.ok || 0) + (ok ? 1 : 0),
        bad: (p.bad || 0) + (ok ? 0 : 1),
        due,
        last: Date.now()
      };
      saveJson(STORAGE_PROGRESS, progress);

      const index = queue.indexOf(current);
      queue.splice(index, 1);
      current = queue[index] || queue[0] || null;
      rememberCurrentPosition("已记录下次编号");
      if (rerender) renderCard(ok ? "已记住" : "已加入错词");
      renderHeader();
      renderStats();
    }

    function renderStats() {
      const total = deck.length;
      const due = deck.filter(isDue).length;
      const learned = deck.filter(item => (getProgress(item).box || 0) >= 3).length;
      const wrong = deck.filter(item => (getProgress(item).bad || 0) > 0).length;
      statsHost.innerHTML = `
        <div class="stat"><strong>${total}</strong><span>词库总数</span></div>
        <div class="stat"><strong>${due}</strong><span>当前到期</span></div>
        <div class="stat"><strong>${learned}</strong><span>较熟词</span></div>
        <div class="stat"><strong>${wrong}</strong><span>错过的词</span></div>
      `;

      const weak = deck
        .filter(item => (getProgress(item).bad || 0) > 0)
        .sort((a, b) => getProgress(b).bad - getProgress(a).bad)
        .slice(0, 20);

      weakList.innerHTML = weak.length
        ? weak.map(item => {
            const p = getProgress(item);
            return `<div class="row"><div><b>${escapeHtml(item.word)}</b><span>${escapeHtml(item.meaning)}</span></div><span>${p.bad} 错</span></div>`;
          }).join("")
        : `<div class="empty">还没有错词。</div>`;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function download(name, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }

    function init() {
      deck = parseDeck(deckText);
      deckArea.value = deckText;
      renderUnits();
      updateJumpStatus();
      buildQueue();
    }

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        const target = tab.dataset.tab;
        tabs.forEach(item => item.classList.toggle("active", item === tab));
        views.forEach(view => view.classList.toggle("active", view.id === target));
        if (target === "report") renderStats();
      });
    });

    unitFilter.addEventListener("change", buildQueue);
    scopeFilter.addEventListener("change", buildQueue);
    document.getElementById("jumpWord").addEventListener("click", () => jumpToDeckIndex(jumpInput.value));
    document.getElementById("savePosition").addEventListener("click", () => rememberCurrentPosition());
    jumpInput.addEventListener("keydown", event => {
      if (event.key === "Enter") jumpToDeckIndex(jumpInput.value);
    });

    document.getElementById("saveDeck").addEventListener("click", () => {
      deckText = deckArea.value;
      localStorage.setItem(STORAGE_DECK, deckText);
      deck = parseDeck(deckText);
      renderUnits();
      updateJumpStatus();
      buildQueue();
      alert("词库已保存");
    });

    document.getElementById("exportDeck").addEventListener("click", () => {
      download("随身默写-词库.tsv", deckArea.value, "text/tab-separated-values;charset=utf-8");
    });

    document.getElementById("exportProgress").addEventListener("click", () => {
      download("随身默写-进度.json", JSON.stringify(progress, null, 2), "application/json;charset=utf-8");
    });

    document.getElementById("resetProgress").addEventListener("click", () => {
      if (!confirm("确定清空所有默写进度？")) return;
      progress = {};
      localStorage.removeItem(STORAGE_PROGRESS);
      buildQueue();
    });

    init();
  </script>
</body>
</html>
